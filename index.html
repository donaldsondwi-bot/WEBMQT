<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>MQTT WebSocket Dashboard</title>

    <!-- Paho MQTT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px 15px;
            font-family: Arial, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .card-header {
            background: var(--primary);
            color: white;
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .card-content {
            padding: 15px;
            display: none;
        }

        .card-content.active {
            display: block;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        #disconnectBtn {
            background: var(--danger);
        }

        #clearBtn {
            background: #f59e0b;
        }

        #status {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            background: var(--danger);
            color: white;
        }

        #messages {
            background: #111;
            color: #00ff00;
            padding: 10px;
            height: 250px;
            overflow-y: auto;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-line;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>MQTT WebSocket Dashboard</h2>

    <!-- STATUS -->
    <div id="status">Not Connected</div>

    <!-- MQTT CONFIG -->
    <div class="card">

        <div class="card-header">
            MQTT Config
        </div>

        <div class="card-content active">

            <select id="protocol">
                <option value="wss">wss</option>
                <option value="ws">ws</option>
            </select>

            <input
                type="text"
                id="broker"
                value="broker.emqx.io"
                placeholder="Broker"
            />

            <input
                type="number"
                id="port"
                value="8084"
                placeholder="Port"
            />

            <input
                type="text"
                id="path"
                value="/mqtt"
                placeholder="Path"
            />

            <button id="connectBtn">
                Connect
            </button>

            <button id="disconnectBtn">
                Disconnect
            </button>

        </div>
    </div>

    <!-- SUBSCRIBE -->
    <div class="card">

        <div class="card-header">
            Subscribe
        </div>

        <div class="card-content">

            <input
                type="text"
                id="subtopic"
                placeholder="example/topic"
            />

            <button id="subscribeBtn">
                Subscribe
            </button>

        </div>
    </div>

    <!-- PUBLISH -->
    <div class="card">

        <div class="card-header">
            Publish
        </div>

        <div class="card-content">

            <input
                type="text"
                id="pubtopic"
                placeholder="example/topic"
            />

            <input
                type="text"
                id="message"
                placeholder="hello mqtt"
            />

            <button id="publishBtn">
                Send Message
            </button>

        </div>
    </div>

    <!-- MESSAGES -->
    <div class="card">

        <div class="card-header">
            Messages
        </div>

        <div class="card-content active">

            <div id="messages">
Waiting data...
            </div>

            <br>

            <button id="clearBtn">
                Hapus Pesan
            </button>

        </div>
    </div>

</div>

<script>

    // Shortcut
    const $ = (id) => document.getElementById(id);

    let client = null;
    let connected = false;

    // Toggle Card
    document.querySelectorAll(".card-header").forEach((header) => {

        header.addEventListener("click", () => {

            header.nextElementSibling.classList.toggle("active");

        });

    });

    // LOG
    function log(text) {

        const msgBox = $("messages");

        const time = new Date().toLocaleTimeString();

        msgBox.innerHTML += `[${time}] ${text}\n`;

        msgBox.scrollTop = msgBox.scrollHeight;
    }

    // STATUS
    function setStatus(text, type) {

        const status = $("status");

        status.textContent = text;

        if (type === "success") {

            status.style.background = "var(--success)";

        } else if (type === "danger") {

            status.style.background = "var(--danger)";

        } else {

            status.style.background = "var(--primary)";
        }
    }

    // CONNECT
    $("connectBtn").addEventListener("click", () => {

        const protocol = $("protocol").value;

        const broker = $("broker").value;

        const port = parseInt($("port").value);

        const path = $("path").value;

        const clientID =
            "web_" + Math.random().toString(16).substr(2, 8);

        // Create MQTT Client
        client = new Paho.MQTT.Client(
            broker,
            port,
            path,
            clientID
        );

        // Connection Lost
        client.onConnectionLost = (responseObject) => {

            connected = false;

            setStatus("Connection Lost", "danger");

            log("Connection lost");

            if (responseObject.errorMessage) {

                log("Error: " + responseObject.errorMessage);
            }
        };

        // Message Arrived
        client.onMessageArrived = (message) => {

            log(
                `Topic: ${message.destinationName} | Message: ${message.payloadString}`
            );
        };

        // Connect
        client.connect({

            useSSL: protocol === "wss",

            timeout: 5,

            onSuccess: () => {

                connected = true;

                setStatus(
                    `Connected to ${broker}`,
                    "success"
                );

                log("Connected to broker");
            },

            onFailure: (err) => {

                connected = false;

                setStatus(
                    "Connection Failed",
                    "danger"
                );

                log(
                    "Failed: " + err.errorMessage
                );
            }

        });

    });

    // DISCONNECT
    $("disconnectBtn").addEventListener("click", () => {

        if (client && connected) {

            client.disconnect();

            connected = false;

            setStatus(
                "Disconnected",
                "danger"
            );

            log("Disconnected from broker");

        } else {

            alert("Not connected");
        }

    });

    // SUBSCRIBE
    $("subscribeBtn").addEventListener("click", () => {

        if (!connected) {

            alert("Not connected");

            return;
        }

        const topic = $("subtopic").value;

        if (topic === "") {

            alert("Topic kosong");

            return;
        }

        client.subscribe(topic);

        log("Subscribed: " + topic);

    });

    // PUBLISH
    $("publishBtn").addEventListener("click", () => {

        if (!connected) {

            alert("Not connected");

            return;
        }

        const topic = $("pubtopic").value;

        const msg = $("message").value;

        if (topic === "" || msg === "") {

            alert("Topic atau message kosong");

            return;
        }

        const message = new Paho.MQTT.Message(msg);

        message.destinationName = topic;

        client.send(message);

        log(
            `Sent to ${topic} : ${msg}`
        );

    });

    // CLEAR MESSAGE
    $("clearBtn").addEventListener("click", () => {

        $("messages").innerHTML =
            "Waiting data...\n";

    });

</script>

</body>
</html>
